name: Refactoring Backlog

on:
  schedule:
    # Tue/Thu/Sat 00:00 JST
    - cron: "0 15 * * 1,3,5"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VP_BOOTSTRAP_VERSION: 0.1.14
  REFACTORING_BACKLOG_LABEL: refactoring-backlog
  IMPLEMENTATION_LABEL: implementation
  REFACTORING_BACKLOG_MARKER: <!-- refactoring-backlog:sonarcloud -->
  REFACTORING_BACKLOG_TITLE: refactoring backlog
  REFACTORING_BACKLOG_OUTPUT_DIR: artifacts/refactoring-backlog
  SONAR_PROJECT_KEY: ${{ vars.SONAR_PROJECT_KEY }}
  SONAR_BRANCH: main

concurrency:
  group: refactoring-backlog-${{ github.ref }}
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Enable Corepack
        run: |
          corepack enable
          corepack install

      - name: Get pnpm store path
        id: pnpm-cache-dir
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ steps.pnpm-cache-dir.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm --package="vite-plus@${VP_BOOTSTRAP_VERSION}" dlx vp install --frozen-lockfile

      - name: Build refactoring backlog issue body
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: node --experimental-strip-types .github/scripts/refactoring-backlog.ts

      - name: Create backlog issue and close superseded snapshots
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          gh label create "$REFACTORING_BACKLOG_LABEL" \
            --description "Periodic refactoring backlog generated from SonarCloud" \
            --color "0969da" \
            || true

          gh label create "$IMPLEMENTATION_LABEL" \
            --description "Ready for coding-agent implementation" \
            --color "1f883d" \
            || true

          issue_title="$(<"$REFACTORING_BACKLOG_OUTPUT_DIR/title.txt")"
          new_issue_url=$(
            gh issue create \
              --title "${issue_title:-$REFACTORING_BACKLOG_TITLE}" \
              --body-file "$REFACTORING_BACKLOG_OUTPUT_DIR/body.md" \
              --label "$REFACTORING_BACKLOG_LABEL" \
              --label "$IMPLEMENTATION_LABEL"
          )
          new_issue_number="${new_issue_url##*/}"

          mapfile -t backlog_issue_numbers < <(
            gh issue list \
              --label "$REFACTORING_BACKLOG_LABEL" \
              --state open \
              --limit 100 \
              --json number,body \
              --jq '.[] | select(.body | contains(env.REFACTORING_BACKLOG_MARKER)) | .number'
          )

          for issue_number in "${backlog_issue_numbers[@]}"; do
            if [[ "$issue_number" == "$new_issue_number" ]]; then
              continue
            fi

            gh issue comment "$issue_number" --body "Superseded by #$new_issue_number" || true
            gh issue close "$issue_number"
          done
