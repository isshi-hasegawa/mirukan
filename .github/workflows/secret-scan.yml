name: Betterleaks Secret Scan

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    name: Betterleaks Repository Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run Betterleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/betterleaks/betterleaks:latest \
            git --validation=false --no-banner .
