name: Betterleaks Secret Scan

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    name: Betterleaks Repository Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Betterleaks
        run: |
          docker run --rm \
            -e GIT_CONFIG_COUNT=1 \
            -e GIT_CONFIG_KEY_0=safe.directory \
            -e GIT_CONFIG_VALUE_0=/repo \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/betterleaks/betterleaks:latest \
            git --validation=false --no-banner .
