name: Secret Scan

on:
  pull_request:
  push:

jobs:
  betterleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Betterleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/betterleaks/betterleaks:latest \
            git --validation=false --no-banner .
