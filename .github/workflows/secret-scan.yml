name: Betterleaks Secret Scan

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  scan:
    name: Betterleaks Repository Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0

      - name: Run Betterleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            ghcr.io/betterleaks/betterleaks:latest \
            git --validation=false --no-banner .
