name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VITE_SUPABASE_URL: http://127.0.0.1:54321
  VITE_SUPABASE_PUBLISHABLE_KEY: ci-publishable-key
  VP_BOOTSTRAP_VERSION: 0.1.14

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: pnpm --package="vite-plus@${VP_BOOTSTRAP_VERSION}" dlx vp install --frozen-lockfile

      - name: Add local binaries to PATH
        run: echo "${GITHUB_WORKSPACE}/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run checks
        run: vp check

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: pnpm --package="vite-plus@${VP_BOOTSTRAP_VERSION}" dlx vp install --frozen-lockfile

      - name: Add local binaries to PATH
        run: echo "${GITHUB_WORKSPACE}/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage
          vp exec vitest --coverage | tee coverage/vitest-coverage.txt

      - name: Append coverage summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Vitest Coverage"
            echo
            if [ -f coverage/vitest-coverage.txt ]; then
              sed -n '/^% Coverage report from v8/,$p' coverage/vitest-coverage.txt
            else
              echo "Coverage summary unavailable because the test step did not produce coverage output."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: pnpm --package="vite-plus@${VP_BOOTSTRAP_VERSION}" dlx vp install --frozen-lockfile

      - name: Add local binaries to PATH
        run: echo "${GITHUB_WORKSPACE}/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@b60b5899c73b63a2d2d651b1e90db8d4c9392f51 # v1.6.0
        with:
          version: latest

      - name: Start Supabase local stack
        run: >-
          supabase start
          --exclude studio,mailpit,imgproxy,storage-api,realtime,postgres-meta,logflare,vector,supavisor,edge-runtime

      - name: Run E2E tests (chromium)
        run: playwright test --project chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: pnpm --package="vite-plus@${VP_BOOTSTRAP_VERSION}" dlx vp install --frozen-lockfile

      - name: Add local binaries to PATH
        run: echo "${GITHUB_WORKSPACE}/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run build
        run: vp build
