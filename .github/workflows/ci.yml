name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable Corepack
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Add local binaries to PATH
        run: echo "${GITHUB_WORKSPACE}/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run checks
        run: vp check

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable Corepack
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Add local binaries to PATH
        run: echo "${GITHUB_WORKSPACE}/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run unit tests
        run: vp test

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Enable Corepack
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Add local binaries to PATH
        run: echo "${GITHUB_WORKSPACE}/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run build
        run: vp build
