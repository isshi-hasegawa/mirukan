name: CI

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  VITE_SUPABASE_URL: http://127.0.0.1:54321
  VITE_SUPABASE_PUBLISHABLE_KEY: ci-publishable-key
  VP_BOOTSTRAP_VERSION: 0.1.14

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: pnpm --package="vite-plus@${VP_BOOTSTRAP_VERSION}" dlx vp install --frozen-lockfile

      - name: Add local binaries to PATH
        run: echo "${GITHUB_WORKSPACE}/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run checks
        run: vp check

  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: pnpm --package="vite-plus@${VP_BOOTSTRAP_VERSION}" dlx vp install --frozen-lockfile

      - name: Add local binaries to PATH
        run: echo "${GITHUB_WORKSPACE}/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run unit tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p coverage
          vp test --coverage | tee coverage/vitest-coverage.txt

      - name: Append coverage summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Vitest Coverage"
            echo
            if [ -f coverage/vitest-coverage.txt ]; then
              sed -n '/^% Coverage report from v8/,$p' coverage/vitest-coverage.txt
            else
              echo "Coverage summary unavailable because the test step did not produce coverage output."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false

      - name: Enable Corepack
        run: |
          corepack enable
          corepack install

      - name: Install dependencies
        run: pnpm --package="vite-plus@${VP_BOOTSTRAP_VERSION}" dlx vp install --frozen-lockfile

      - name: Add local binaries to PATH
        run: echo "${GITHUB_WORKSPACE}/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Run build
        run: vp build
