<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>メールアドレス変更の確認</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f5f5f4;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif;
      color: #1c1917;
    }
    .wrapper {
      max-width: 560px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .card {
      background-color: #ffffff;
      border-radius: 16px;
      padding: 40px 36px;
      border: 1px solid #e7e5e4;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #1c1917;
      margin-bottom: 28px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 12px;
    }
    p {
      font-size: 15px;
      line-height: 1.7;
      color: #57534e;
      margin: 0 0 24px;
    }
    .button {
      display: inline-block;
      background-color: #f97316;
      color: #ffffff !important;
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 10px;
      margin-bottom: 28px;
    }
    .note {
      font-size: 13px;
      color: #a8a29e;
      margin: 0;
    }
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #a8a29e;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="card">
      <div class="logo">みるカン</div>
      <h1>メールアドレス変更の確認</h1>
      <p>新しいメールアドレスへの変更をリクエストしました。<br />下のボタンをクリックして、変更を確定してください。</p>
      <a href="{{ .ConfirmationURL }}" class="button">メールアドレスの変更を確認する</a>
      <p class="note">このリクエストに心当たりがない場合は、無視してください。</p>
    </div>
    <div class="footer">© みるカン</div>
  </div>
</body>
</html>
