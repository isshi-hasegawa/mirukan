project_id = "mirukan"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# ローカル開発用 URL。本番リンク時は Supabase ダッシュボードで上書きされる
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.email.template.confirmation]
subject = "みるカン - メールアドレスの確認"
content_path = "./supabase/templates/confirmation.html"

[auth.email.template.recovery]
subject = "みるカン - パスワードの再設定"
content_path = "./supabase/templates/recovery.html"

[auth.email.template.email_change]
subject = "みるカン - メールアドレス変更の確認"
content_path = "./supabase/templates/email_change.html"

[functions.search-tmdb-works]
verify_jwt = false

[functions.fetch-tmdb-trending]
verify_jwt = false

[functions.fetch-tmdb-similar]
verify_jwt = false

[functions.fetch-tmdb-season-options]
verify_jwt = false

[functions.fetch-tmdb-work-details]
verify_jwt = false

[functions.fetch-omdb-work-details]
verify_jwt = false

[functions.suggest-display-title]
verify_jwt = true
